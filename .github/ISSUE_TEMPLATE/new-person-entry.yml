name: 新增人物档案
description: 提交一个新人物档案需求，维护者可据此创建 data/people/*.md
title: "[新增档案] <姓名>"
labels:
  - archive
  - new-entry
body:
  - type: markdown
    attributes:
      value: |
        该表单用于收集线索。
        Issue 不会自动修改仓库文件，最终入库仍需 Pull Request。
        若涉及头像，请在后续 PR 中把图片文件提交到 `data/avatars/`。

  - type: input
    id: person_name
    attributes:
      label: 姓名（必填）
      placeholder: 例如：张三
    validations:
      required: true

  - type: input
    id: person_alias
    attributes:
      label: 别名/常用称呼（可选）
      placeholder: 例如：某三

  - type: input
    id: organization
    attributes:
      label: 所属机构（必填）
      placeholder: 例如：示例机构A
    validations:
      required: true

  - type: input
    id: avatar_hint
    attributes:
      label: 头像文件说明（必填）
      description: 说明计划提交到仓库的头像路径，例如 data/avatars/zhang-san.jpg
      placeholder: 建议文件名 + 来源说明 + 是否可公开使用
    validations:
      required: true

  - type: input
    id: tags
    attributes:
      label: 标签（必填，逗号分隔）
      description: 会写入 front matter 的 tags
      placeholder: 例如：经济, 舆论
    validations:
      required: true

  - type: input
    id: updated
    attributes:
      label: 最近更新时间（必填，YYYY-MM-DD）
      placeholder: 例如：2026-03-07
    validations:
      required: true

  - type: textarea
    id: summary
    attributes:
      label: 概述（必填）
      description: 建议 1-3 段，先写可核查事实。
      placeholder: 说明该人物关键行为与背景
    validations:
      required: true

  - type: textarea
    id: timeline
    attributes:
      label: 关键时间线（可选）
      description: 建议按时间顺序列举
      placeholder: |
        1. 2024-08：事件 A。
        2. 2025-12：事件 B。

  - type: textarea
    id: evidence_links
    attributes:
      label: 证据与来源链接（必填）
      description: 至少 1 条 http/https 链接，建议多条。
      placeholder: |
        1. https://example.com/source-1
        2. https://example.com/source-2
    validations:
      required: true

  - type: checkboxes
    id: confirmation
    attributes:
      label: 提交确认
      options:
        - label: 我确认以上信息可核查，并提供了至少一条有效来源链接
          required: true
        - label: 我理解最终入库需要通过 Pull Request 提交代码变更
          required: true
