name: 修改已有档案
description: 申请补充/修订现有人物档案内容
title: "[修改档案] <姓名或id>"
labels:
  - archive
  - update-entry
body:
  - type: markdown
    attributes:
      value: |
        该表单用于收集修改建议。
        Issue 不会自动修改仓库文件，最终入库仍需 Pull Request。
        若涉及头像更新，请在后续 PR 中提交 `data/avatars/` 下的文件改动。

  - type: input
    id: person_id
    attributes:
      label: 人物 id（必填）
      description: 对应 data/people/<id>.md 的文件名
      placeholder: 例如：zhang-san
    validations:
      required: true

  - type: input
    id: person_name
    attributes:
      label: 人物姓名（必填）
      placeholder: 例如：张三
    validations:
      required: true

  - type: dropdown
    id: update_type
    attributes:
      label: 修改类型（必选）
      options:
        - 新增事实与时间线
        - 更新或替换来源链接
        - 修正错误信息
        - 更新人物头像
        - 结构与表达优化
    validations:
      required: true

  - type: input
    id: avatar_change
    attributes:
      label: 头像更新说明（可选）
      description: 若涉及头像，请说明目标文件名（data/avatars/xxx.jpg）和来源
      placeholder: 例如：替换为 data/avatars/zhang-san-2026.jpg，来源为...

  - type: textarea
    id: current_content
    attributes:
      label: 当前内容位置（可选）
      description: 指明要修改的章节标题或段落
      placeholder: 例如："## 关键时间线" 第 2 条

  - type: textarea
    id: proposed_change
    attributes:
      label: 期望修改内容（必填）
      description: 直接给出建议替换文案或新增文案
      placeholder: |
        建议替换为：
        ...

        或新增：
        ...
    validations:
      required: true

  - type: textarea
    id: evidence_links
    attributes:
      label: 相关证据与来源链接（必填）
      description: 至少 1 条 http/https 链接
      placeholder: |
        1. https://example.com/source-1
        2. https://example.com/source-2
    validations:
      required: true

  - type: input
    id: updated
    attributes:
      label: 建议更新日期（必填，YYYY-MM-DD）
      placeholder: 例如：2026-03-07
    validations:
      required: true

  - type: checkboxes
    id: confirmation
    attributes:
      label: 提交确认
      options:
        - label: 我确认修改建议基于可核查信息，并附带来源链接
          required: true
        - label: 我理解最终入库需要通过 Pull Request 提交代码变更
          required: true
